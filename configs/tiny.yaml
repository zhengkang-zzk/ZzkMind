model:
  vocab_size: 5000
  hidden_size: 128
  intermediate_size: 256
  num_attention_heads: 4
  num_hidden_layers: 4
  max_position_embeddings: 32
  dropout: 0.1

  rope_base: 1000000.0
  rope_scaling: 
    original_max_position_embeddings: 2048
    factor: 16
    beta_fast: 32.0
    beta_slow: 1.0
    attention_factor: 1.0

  use_moe: true
  moe_num_experts: 4
  moe_top_k: 2
  moe_expert_capacity:
  moe_capacity_factor: 1.25
  moe_use_shared_expert: true

train:
  batch_size: 8
  lr: 0.0003
  device: "cuda"
  num_epochs: 5
  log_interval: 10
  grad_clip: 1.0
  save_dir: "checkpoints"
  moe_aux_loss_weight: 0.01

data:
  train_path: "dataset/train.txt"
  val_path: "dataset/val.txt"
