model:
  vocab_size: 5000
  hidden_size: 128
  intermediate_size: 256
  num_attention_heads: 4
  num_hidden_layers: 4
  max_position_embeddings: 128
  dropout: 0.1

train:
  batch_size: 8
  lr: 0.0003
  max_steps: 1000
  device: "cuda"

data:
  train_path: "dataset/train.txt"
  val_path: "dataset/val.txt"